syntax = "proto3";
package pocket.tokenomics;

option go_package = "github.com/pokt-network/poktroll/x/tokenomics/types";
option (gogoproto.stable_marshaler_all) = true;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "pocket/proof/types.proto";

import "pocket/tokenomics/types.proto";

// TODO_CONSIDERATION: Consider prefixing these enums with CLAIM_EXPIRATION_REASON_
enum ClaimExpirationReason {
    // Default value, means may be valid
    EXPIRATION_REASON_UNSPECIFIED = 0;

    // A proof was required but not submitted
    PROOF_MISSING = 1;

    // A proof was submitted but was invalid
    PROOF_INVALID = 2;
}

// EventClaimExpired is emitted during settlement when a claim expires.
// This is likely the result of a claim requiring an onchain proof not being submitted.
// The claim cannot be settled, leading to that work never being rewarded.
message EventClaimExpired {
    // Next index: 13

    // pocket.proof.Claim claim = 1 [(gogoproto.jsontag) = "claim"];
    // cosmos.base.v1beta1.Coin claimed_upokt = 6 [(gogoproto.jsontag) = "claimed_upokt"];
    reserved 1, 6;

    // The reason why the claim expired, leading to a Supplier being penalized (i.e. burn).
    ClaimExpirationReason expiration_reason = 2 [(gogoproto.jsontag) = "expiration_reason"];

    // Number of relays claimed to be in the session tree.
    uint64 num_relays = 3 [(gogoproto.jsontag) = "num_relays"];

    // Number of compute units claimed in the session tree.
    // It is a function of the number of relays in the session tree and onchain parameters.
    uint64 num_claimed_compute_units = 4 [(gogoproto.jsontag) = "num_claimed_compute_units"];

    // Number of total estimated compute units of work done.
    // It is a function of the number of claimed compute units and the relay difficulty multiplier.
    uint64 num_estimated_compute_units = 5 [(gogoproto.jsontag) = "num_estimated_compute_units"];

    // The amount of uPOKT claimed for the work done.
    // It is a function of the number of estimated compute units and the compute units to token multiplier.
    string claimed_upokt = 7 [(gogoproto.jsontag) = "claimed_upokt"];

    // The Service ID to which the claim corresponds.
    string service_id = 8;

    // The address of the application which participated in the claimed session.
    string application_address = 9 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The end block height of the session to which the claim corresponds.
    int64 session_end_block_height = 10;

    // The validation status of the claim.
    // DEV_NOTE: This field uses the integer representation of the ClaimProofStatus
    // enum to minimize onchain disk utilization. This is necessary because event
    // data is not always protobuf-encoded in the various places and formats that it
    // appears in onchain leveldb databases.
    // Enum values:
    //   PENDING_VALIDATION = 0;
    //   VALIDATED = 1;
    //   INVALID = 2;
    int32 claim_proof_status_int = 11;

    // The operator address of the supplier whose claim expired.
    string supplier_operator_address = 12 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// EventClaimSettled is emitted during settlement whenever a claim is successfully settled.
// It may or may not require a proof depending on various on-chain parameters and other factors.
message EventClaimSettled {
    // Next index: 24

    // pocket.proof.Claim claim = 1 [(gogoproto.jsontag) = "claim"];
    // cosmos.base.v1beta1.Coin claimed_upokt = 6 [(gogoproto.jsontag) = "claimed_upokt"];
    // ClaimSettlementResult settlement_result = 7 [(gogoproto.nullable) = false, (gogoproto.jsontag) = "settlement_result"];
    reserved 1, 6, 7;

    // Whether a proof was required for the claim to be settled.
    // DEV_NOTE: This field uses the integer representation of the ProofRequirementReason
    // enum to minimize onchain disk utilization. This is necessary because event
    // data is not always protobuf-encoded in the various places and formats that it
    // appears in onchain leveldb databases.
    // Enum values:
    //   NOT_REQUIRED = 0;
    //   PROBABILISTIC = 1;
    //   THRESHOLD = 2;
    int32 proof_requirement_int = 2;

    // Number of relays claimed to be in the session tree.
    uint64 num_relays = 3 [(gogoproto.jsontag) = "num_relays"];

    // Number of compute units claimed in the session tree.
    // It is a function of the number of relays in the session tree and onchain parameters.
    uint64 num_claimed_compute_units = 4 [(gogoproto.jsontag) = "num_claimed_compute_units"];

    // Number of estimated compute units claimed in the session tree.
    // It is a function of the number of claimed compute units and the relay difficulty multiplier for the particular service.
    uint64 num_estimated_compute_units = 5 [(gogoproto.jsontag) = "num_estimated_compute_units"];

    // The uPOKT coin claimed to be rewarded for the work done as a function of
    // the number of estimated compute units and the compute units to token multiplier.
    string claimed_upokt = 8 [(gogoproto.jsontag) = "claimed_upokt"];

    // The Service ID to which the claim corresponds.
    string service_id = 9;

    // The address of the application which participated in the claimed session.
    string application_address = 10 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The end block height of the session to which the claim corresponds.
    int64 session_end_block_height = 11;

    // The validation status of the claim.
    // DEV_NOTE: This field uses the integer representation of the ClaimProofStatus
    // enum to minimize onchain disk utilization. This is necessary because event
    // data is not always protobuf-encoded in the various places and formats that it
    // appears in onchain leveldb databases.
    // Enum values:
    //   PENDING_VALIDATION = 0;
    //   VALIDATED = 1;
    //   INVALID = 2;
    int32 claim_proof_status_int = 12;

    // The operator address of the supplier who submitted the claim.
    string supplier_operator_address = 13 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // A map of addresses to token amounts corresponding to the distribution of the reward tokens.
    // Deprecated: Use reward_distribution_detailed which preserves OpReason per entry.
    map<string, string> reward_distribution = 14 [(gogoproto.nullable) = false, (gogoproto.jsontag) = "mint_distribution"];

    // Detailed per-reason reward breakdown. Unlike reward_distribution (field 14)
    // which merges all reasons per address, this preserves the OpReason for each entry.
    repeated RewardDistributionDetail reward_distribution_detailed = 15 [(gogoproto.nullable) = false, (gogoproto.jsontag) = "reward_distribution_detailed"];

    // The actual settlement amount after overservicing cap, before mint_ratio.
    // Indexers can compute: overservicing_loss = claimed_upokt - settled_upokt
    string settled_upokt = 16 [(gogoproto.jsontag) = "settled_upokt"];

    // The mint_ratio applied during settlement (from tokenomics params).
    // Indexers can compute: deflation_loss = settled_upokt * (1 - mint_ratio)
    string mint_ratio = 17 [(gogoproto.jsontag) = "mint_ratio"];

    // The unique session ID hash for this claim's session.
    // Enables direct joins without needing composite keys (app + service + session_end).
    string session_id = 18 [(gogoproto.jsontag) = "session_id"];

    // The owner address of the supplier who submitted the claim.
    // Useful when owner != operator (delegated staking) for attributing rewards.
    string supplier_owner_address = 19 [(cosmos_proto.scalar) = "cosmos.AddressString", (gogoproto.jsontag) = "supplier_owner_address"];

    // The probabilistic estimation of the total number of relays served in this session.
    // Derived from the relay mining difficulty: num_estimated_relays = num_relays * difficulty_multiplier.
    // Unlike num_relays (which is only the count of leaves in the session tree that matched
    // the relay mining difficulty), this reflects the actual estimated workload.
    uint64 num_estimated_relays = 20 [(gogoproto.jsontag) = "num_estimated_relays"];

    // The actual amount of uPOKT minted for this claim via the Relay Burn Equals Mint TLM.
    // minted_upokt = settled_upokt * mint_ratio (truncated to integer).
    // This is the real economic value created by this claim after both overservicing and deflation.
    // Relationship: claimed_upokt >= settled_upokt >= minted_upokt
    string minted_upokt = 21 [(gogoproto.jsontag) = "minted_upokt"];

    // The amount of uPOKT lost to overservicing for this claim.
    // overservicing_loss_upokt = claimed_upokt - settled_upokt.
    // Zero when the supplier's claim fits within the application's per-supplier budget.
    string overservicing_loss_upokt = 22 [(gogoproto.jsontag) = "overservicing_loss_upokt"];

    // The amount of uPOKT permanently removed from circulation (deflation) for this claim.
    // deflation_loss_upokt = settled_upokt - minted_upokt = settled_upokt * (1 - mint_ratio).
    // Zero when mint_ratio = 1 (no deflation).
    string deflation_loss_upokt = 23 [(gogoproto.jsontag) = "deflation_loss_upokt"];
}

// EventApplicationOverserviced is emitted when an Application's stake cannot cover the Supplier's claim.
// This means the following will ALWAYS be strictly true:  effective_burn < expected_burn
// - Number of tokens burnt from app stake < Number of tokens burnt from supplier stake
message EventApplicationOverserviced {
    // Next index: 10

    // cosmos.base.v1beta1.Coin expected_burn = 3;
    // cosmos.base.v1beta1.Coin effective_burn = 4;
    reserved 3, 4;

    // The application address consuming onchain services
    string application_addr = 1;

    // The supplier operator address providing onchain services
    string supplier_operator_addr = 2;

    // Expected number of tokens to be burnt from the application's stake.
    // A function of the actual amount of work claimed to be done.
    string expected_burn  = 5;

    // Actual number of tokens burnt from the application's stake.
    // A function of the amount that could be covered (less than) relative to the amount of work claimed to be done.
    string effective_burn  = 6;

    // The Service ID for the session where overservicing occurred.
    // Enables unambiguous joins with EventClaimSettled.
    string service_id = 7;

    // The session end block height where overservicing occurred.
    // Together with service_id, application_addr, and supplier_operator_addr,
    // this uniquely identifies the corresponding EventClaimSettled.
    int64 session_end_block_height = 8;

    // Whether overservicing was triggered by per_session_spend_limit (true)
    // vs the standard stake-based cap (false, default).
    bool spend_limit_exceeded = 9;
}

// EventSupplierSlashed is emitted when a supplier is slashed.
// This can happen for in cases such as missing or invalid proofs for submitted claims.
message EventSupplierSlashed {
    // Next index: 9

    // pocket.proof.Claim claim = 1;
    // cosmos.base.v1beta1.Coin proof_missing_penalty = 2;
    reserved 1, 2;

    // Amount slashed from the supplier's stake.
    // A function of the claim size, supplier stake, and various onchain parameters.
    string proof_missing_penalty = 3;

    // The Service ID to which the claim corresponds.
    string service_id = 4;

    // The address of the application which participated in the claimed session.
    string application_address = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The end block height of the session to which the claim corresponds.
    int64 session_end_block_height = 6;

    // The validation status of the claim.
    // DEV_NOTE: This field uses the integer representation of the ClaimProofStatus
    // enum to minimize onchain disk utilization. This is necessary because event
    // data is not always protobuf-encoded in the various places and formats that it
    // appears in onchain leveldb databases.
    // Enum values:
    //   PENDING_VALIDATION = 0;
    //   VALIDATED = 1;
    //   INVALID = 2;
    int32 claim_proof_status_int = 7;

    // The operator address of the supplier that was slashed.
    string supplier_operator_address = 8 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// EventClaimDiscarded is emitted when a claim is discarded due to unexpected situations.
// It is used to prevent chain halts in favor of some missing claims.
message EventClaimDiscarded {
    // Next index: 8

    // pocket.proof.Claim claim = 1;
    reserved 1;

    // The error that caused the claim to be discarded.
    string error = 2;

    // The Service ID to which the claim corresponds.
    string service_id = 3;

    // The address of the application which participated in the claimed session.
    string application_address = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The end block height of the session to which the claim corresponds.
    int64 session_end_block_height = 5;

    // The validation status of the claim.
    // DEV_NOTE: This field uses the integer representation of the ClaimProofStatus
    // enum to minimize onchain disk utilization. This is necessary because event
    // data is not always protobuf-encoded in the various places and formats that it
    // appears in onchain leveldb databases.
    // Enum values:
    //   PENDING_VALIDATION = 0;
    //   VALIDATED = 1;
    //   INVALID = 2;
    int32 claim_proof_status_int = 6;

    // The operator address of the supplier whose claim was discarded.
    string supplier_operator_address = 7 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// RewardDistributionDetail is a per-recipient, per-reason reward breakdown for a single claim.
// Unlike the reward_distribution map (which merges all OpReasons per address),
// this preserves the OpReason for each entry.
message RewardDistributionDetail {
    // The recipient address (bech32).
    string recipient_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The settlement operation reason from the TLM.
    SettlementOpReason op_reason = 2;

    // The reward amount as a coin string (e.g. "1000upokt").
    string amount = 3;
}

// EventSettlementBatch is emitted once per unique aggregated bank operation during settlement.
// It provides the link between batched bank transfers and the settlement context.
message EventSettlementBatch {
    // The session end block height for the batch of settlements.
    int64 session_end_block_height = 1;

    // The sender module account (or destination module for mints/burns).
    string sender_module = 2;

    // The recipient (bech32 address for mod-to-acct, module name for mod-to-mod, empty for mints/burns).
    string recipient = 3;

    // The settlement operation reason from the TLM.
    SettlementOpReason op_reason = 4;

    // The total aggregated amount as a coin string.
    string total_amount = 5;

    // Number of individual claims that contributed to this batch.
    uint32 num_claims = 6;

    // The type of bank operation: "mint", "burn", "mod_to_mod", "mod_to_acct".
    string op_type = 7;
}

// EventValidatorRewardDistribution is emitted once per bonded validator per settlement
// op_reason per settlement block. It summarizes how that validator's slice of the proposer
// reward pool was split into commission and per-delegator rewards.
//
// It does NOT multiply with the number of delegators or claims (it is bounded by the
// validator-set size), preserving the settlement event-count reduction from #1758.
//
// A delegator's reward from this validator can be reconstructed (off-chain / indexer side)
// without per-delegator events:
//
//	delegatorReward = (self_delegation_reward_upokt + delegators_reward_upokt)
//	                  × (delegatorStake / total_delegated_stake_upokt)
//
// where `(self_delegation_reward_upokt + delegators_reward_upokt)` is the post-commission
// remainder, distributed across all delegations (including the validator's self-delegation)
// proportional to stake.
//
// CROSS-DELEGATION ACCOUNTING NOTE (for indexers):
// When the SAME pokt address is both a validator's account AND a delegator on a
// different validator, its income from BOTH sources is bucketed under the
// validator-side op_reason in EventSettlementBatch (because the bank-batch
// accumulator keys on (recipient, op_reason), not source). Per-validator
// breakdown reported BY THIS EVENT stays correct — commission_upokt is
// unambiguously validator income and delegators_reward_upokt /
// self_delegation_reward_upokt are unambiguously delegator-side. Indexers
// building "VALIDATOR vs DELEGATOR" totals across the bank-batch stream
// should sum from this event (per-validator) rather than from
// EventSettlementBatch alone, otherwise cross-delegation accounts will
// over-count under VALIDATOR and under-count under DELEGATOR.
message EventValidatorRewardDistribution {
    // Next index: 12

    // The session end block height for the batch of settlements.
    //
    // Caveat (cross-session batches): when settlement processes claims that
    // belong to DIFFERENT session_end_block_heights in the same settlement
    // block (the O2 cross-session candidate-scan path, exercised after a
    // window-offset change), this field reports the session_end_block_height
    // of the FIRST claim in the batched results — it does NOT identify every
    // session contributing to the pool. Indexers wanting a canonical timestamp
    // for the validator-reward summary should use the settlement block height
    // from the SDK header (the height at which this event was emitted) rather
    // than treating session_end_block_height as definitive. On the common
    // path (single-session settlement, by far the typical case on mainnet),
    // this field and the settlement block height differ by exactly the
    // claim/proof-window offsets, and there is no ambiguity.
    int64 session_end_block_height = 1;

    // The settlement operation reason (distinguishes Mint=Burn from Global Mint pools).
    SettlementOpReason op_reason = 2;

    // The validator operator (valoper...) address.
    string validator_operator_address = 3;

    // The validator account (pokt...) address; commission and the self-delegation slice
    // are paid here.
    string validator_account_address = 4;

    // The validator's commission rate as a decimal string (e.g. "0.100000000000000000").
    string commission_rate = 5;

    // The validator's slice of the total proposer reward pool, as upokt.
    string pool_share_upokt = 6;

    // The commission carved out of pool_share_upokt and paid to the validator account, as upokt.
    string commission_upokt = 7;

    // The validator's own self-delegation slice of the post-commission remainder, as upokt.
    // For sole-stakeholder validators (no external delegations), the entire remainder is here.
    string self_delegation_reward_upokt = 8;

    // The portion of the post-commission remainder paid to external (non-self) delegators, as upokt.
    string delegators_reward_upokt = 9;

    // The total delegated stake backing this validator (includes the self-delegation), as upokt.
    // This is the denominator for per-delegator reward attribution.
    string total_delegated_stake_upokt = 10;

    // The number of external (non-self) delegators that received a reward from this validator.
    uint32 num_delegators = 11;
}

// EventSupplierRevShareFallbackDistribution is emitted during settlement when a
// supplier's per-service RevShare list cannot be used as-is to distribute the
// supplier's slice of the reward. The known triggers are:
//
//  1. Sum of revshare percentages != 100 (validation perimeter hole: the
//     stake-time ValidateServiceRevShare guarantees sum == 100 for NEW stakes,
//     but pre-v0.1.34 state migrated via the duplicate-revshare merge
//     (`x/supplier/keeper/migrate_duplicate_revshare.go`) can produce a merged
//     list with sum > 100 — that supplier survives in store until it restakes).
//  2. Duplicate recipient addresses observed AFTER migration (defensive — the
//     migration is expected to have removed them, but settlement validates
//     independently to avoid silent map-overwrite data loss).
//  3. A negative remainder computed during proportional distribution (defensive
//     overflow check; should be unreachable when sum == 100 holds).
//
// On any of the above, settlement pays the full supplier slice to the supplier's
// `owner_address` (a proto-level field guaranteed populated at stake time,
// independent of any revshare config). This rescues the chain from a `NewCoin`
// panic on negative amount AND keeps supplier revenue flowing to the rightful
// owner, while signalling clearly that the operator's revshare config is broken
// and needs to be re-staked.
//
// Indexers should treat this event as a "supplier config is broken" beacon:
// payouts via this event will NOT appear in the revshare-configured recipients'
// balances. Operator follow-up = restake supplier with clean revshare.
//
// Expected occurrences on a healthy mainnet: zero. Non-zero count post-upgrade
// indicates pre-existing duplicate-revshare suppliers that the migration could
// not normalize back to sum == 100; combine with B2 pre-upgrade enumeration to
// reach out to affected operators.
message EventSupplierRevShareFallbackDistribution {
    // The operator address of the supplier whose revshare config was rejected.
    string supplier_operator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The owner address that received the full supplier slice as fallback.
    string supplier_owner_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    // The Service ID for the claim whose distribution triggered the fallback.
    string service_id = 3;

    // The session end block height of the settled claim that triggered the fallback.
    int64 session_end_block_height = 4;

    // The full amount paid to the owner as fallback, as a coin string (e.g. "1000upokt").
    string amount = 5;

    // The settlement operation reason (TLM source) that produced the supplier slice.
    SettlementOpReason op_reason = 6;

    // Observed sum of revshare percentages, 0-255+ in theory but practically a
    // small positive integer different from 100. Reported for operator triage.
    uint64 observed_sum_percentage = 7;

    // Human-readable reason describing why the fallback engaged
    // (e.g. "sum 110 != 100", "duplicate address ...", "negative remainder").
    string reason = 8;
}

// EventApplicationReimbursementRequest is emitted when an application requests a reimbursement from the DAO.
// It is intended to prevent self dealing attacks when global inflation is enabled.
// TODO_DISTANT_FUTURE: Remove this once global inflation is disabled in perpetuity.
message EventApplicationReimbursementRequest {
    // Next index: 8

    // cosmos.base.v1beta1.Coin amount = 6;
    reserved 6;

    // The application address consuming onchain services requesting reimbursement.
    string application_addr = 1;

    // The supplier operator address providing onchain services
    string supplier_operator_addr = 2;

    // The supplier owner address providing onchain services
    string supplier_owner_addr = 3;

    // The service ID associated with the session where a claim was submitted.
    string service_id = 4;

    // The session ID associated with the session where a claim was submitted.
    string session_id = 5;

    // The amount of uPOKT to be reimbursed to the application.
    string amount = 7;
}