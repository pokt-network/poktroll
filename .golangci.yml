version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable:
        - shadow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - revive
        path: ^x/.+/module\.go$
      - linters:
          - unused
        path: ^x/.+/cli/tx\.go$
      - linters:
          - revive
        path: .*/simulation/.*|_simulation\.go$
      - linters:
          - revive
        path: ^x/.+/codec.go$
      - linters:
          - errcheck
        path: _test\.go$
      # cosmos-sdk v0.53.7 added SA1019 deprecation markers on APIs we cannot
      # avoid: InvariantRegistry is part of the AppModule interface contract,
      # and simtestutil.SimulationOperations is used in sim tests. The deprecation
      # is bound to x/crisis removal which is out of scope for v0.1.34.
      # Re-evaluate when bumping to SDK v0.54.x.
      - linters:
          - staticcheck
        text: "SA1019.*InvariantRegistry is deprecated"
      - linters:
          - staticcheck
        text: "SA1019.*SimulationOperations is deprecated"
        path: ^app/sim(_bench)?_test\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - ^x/.+/genesis\.go$
